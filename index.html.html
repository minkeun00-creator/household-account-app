window.addEventListener('DOMContentLoaded', () => {
  const icon = `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%230f0f1e'/><text y='.9em' font-size='72' x='10'>💸</text></svg>`;
  const manifest = {name:"가계부",short_name:"가계부",description:"개인 지출 관리 가계부 앱",start_url:"./",display:"standalone",background_color:"#0f0f1e",theme_color:"#0f0f1e",orientation:"portrait",
    icons:[{src:`data:image/svg+xml,${icon}`,sizes:"192x192",type:"image/svg+xml"},{src:`data:image/svg+xml,${icon}`,sizes:"512x512",type:"image/svg+xml",purpose:"any maskable"}]};
  const blob=new Blob([JSON.stringify(manifest)],{type:'application/json'});
  const link=document.createElement('link');link.rel='manifest';link.href=URL.createObjectURL(blob);document.head.appendChild(link);
  if('serviceWorker' in navigator){
    const sw=`self.addEventListener('install',e=>{self.skipWaiting();});self.addEventListener('activate',e=>{self.clients.claim();});self.addEventListener('fetch',e=>{e.respondWith(fetch(e.request).catch(()=>caches.match(e.request)));});`;
    navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'})),{scope:'./'}).catch(()=>{});
  }
});
</script>

<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useMemo,useRef}=React;

const DEFAULT_CATS=[
  {name:"식비",color:"#FF6B6B"},{name:"교통",color:"#4ECDC4"},{name:"쇼핑",color:"#FFE66D"},
  {name:"주거",color:"#A8E6CF"},{name:"보험",color:"#88D8B0"},{name:"경조사/회비",color:"#C3B1E1"},
  {name:"구독",color:"#F4A261"},{name:"건강",color:"#74B9FF"}
];
const PALETTE=["#FF6B6B","#FF8E53","#FFA94D","#FFE66D","#C0F47C","#A8E6CF","#74B9FF","#4ECDC4","#88D8B0","#C3B1E1","#F7AEF8","#F4A261","#E07BE0","#667eea","#764ba2","#00B894"];
const METHODS=["신용카드","체크카드","현금","계좌이체","기타"];
const INST_OPTS=[2,3,6,10,12,18,24,36];

const LS={
  get:k=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
};

const today=()=>new Date().toISOString().split("T")[0];
const fmt=n=>Number(n).toLocaleString("ko-KR");
const mk=d=>d.slice(0,7);
const addMo=(d,n)=>{const x=new Date(d);x.setMonth(x.getMonth()+n);return x.toISOString().split("T")[0];};
const getMonth=(o=0)=>{const d=new Date();d.setMonth(d.getMonth()+o);return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;};

const IB={width:"100%",padding:"10px 12px",borderRadius:10,border:"1.5px solid #2a2a3a",background:"#1a1a2e",color:"#e0e0f0",fontSize:15,outline:"none",display:"block"};
const LB={fontSize:12,color:"#8888aa",marginBottom:4,display:"block"};
const chip=(a,c="#667eea")=>({padding:"8px 12px",borderRadius:20,border:"none",cursor:"pointer",fontSize:13,fontWeight:600,background:a?c:"#2a2a3a",color:a?"#000":"#aaa"});

function DonutChart({data,catMap}){
  const size=200,cx=100,cy=100,r=70,ir=48;
  const total=data.reduce((a,d)=>a+d.value,0);
  if(!total)return null;
  let angle=-Math.PI/2;
  const slices=data.map(d=>{
    const sweep=(d.value/total)*2*Math.PI;
    const x1=cx+r*Math.cos(angle),y1=cy+r*Math.sin(angle);
    const x2=cx+r*Math.cos(angle+sweep),y2=cy+r*Math.sin(angle+sweep);
    const ix1=cx+ir*Math.cos(angle),iy1=cy+ir*Math.sin(angle);
    const ix2=cx+ir*Math.cos(angle+sweep),iy2=cy+ir*Math.sin(angle+sweep);
    const large=sweep>Math.PI?1:0;
    const path=`M${x1},${y1} A${r},${r} 0 ${large},1 ${x2},${y2} L${ix2},${iy2} A${ir},${ir} 0 ${large},0 ${ix1},${iy1} Z`;
    angle+=sweep;
    return {path,color:catMap[d.name]||"#aaa",name:d.name,value:d.value,pct:Math.round(d.value/total*100)};
  });
  return(
    <div>
      <svg viewBox={`0 0 ${size} ${size}`} width="100%" style={{maxHeight:200}}>
        {slices.map((s,i)=><path key={i} d={s.path} fill={s.color} stroke="#0f0f1e" strokeWidth="2"/>)}
        <text x={cx} y={cy-8} textAnchor="middle" fill="#e0e0f0" fontSize="13">이번달</text>
        <text x={cx} y={cy+10} textAnchor="middle" fill="#e0e0f0" fontSize="11">₩{fmt(total)}</text>
      </svg>
      <div style={{display:"flex",flexWrap:"wrap",gap:"6px 12px",padding:"0 8px 8px"}}>
        {slices.map((s,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:5,fontSize:12}}>
            <div style={{width:8,height:8,borderRadius:"50%",background:s.color,flexShrink:0}}/>
            <span style={{color:"#ccc"}}>{s.name}</span>
            <span style={{color:"#8888aa"}}>{s.pct}%</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function ColorPicker({value,onChange}){
  return <div style={{display:"flex",flexWrap:"wrap",gap:8,marginTop:8}}>
    {PALETTE.map(c=><div key={c} onClick={()=>onChange(c)}
      style={{width:28,height:28,borderRadius:"50%",background:c,cursor:"pointer",border:value===c?"3px solid #fff":"3px solid transparent",flexShrink:0}}/>)}
  </div>;
}

function genRec(recs,existing){
  const cur=mk(today()),res=[];
  recs.filter(r=>r.active).forEach(r=>{
    let m=mk(r.startDate);
    while(m<=cur){
      if(!r.endDate||m<=mk(r.endDate)){
        if(!existing.some(e=>e.recurringId===r.id&&mk(e.date)===m)){
          const day=r.startDate.slice(8,10);
          res.push({id:Date.now()+Math.random(),date:`${m}-${day}`,amount:r.amount,method:r.method,category:r.category,memo:r.memo,recurringId:r.id});
        }
      }
      const [y,mo]=m.split("-").map(Number);
      const nd=new Date(y,mo,1);
      m=`${nd.getFullYear()}-${String(nd.getMonth()+1).padStart(2,"0")}`;
    }
  });
  return res;
}

function App(){
  const [tab,setTab]=useState("home");
  const [stab,setStab]=useState("cat");
  const [expenses,setExpenses]=useState(()=>LS.get("exp")||[]);
  const [cats,setCats]=useState(()=>LS.get("cats")||DEFAULT_CATS);
  const [recs,setRecs]=useState(()=>LS.get("recs")||[]);
  const [apiKey,setApiKey]=useState(()=>LS.get("apikey")||"");
  const [showApiKey,setShowApiKey]=useState(false);

  const [form,setForm]=useState({date:today(),amount:"",method:"신용카드",category:"식비",memo:""});
  const [editId,setEditId]=useState(null);
  const [iMode,setIMode]=useState("normal");
  const [iMonths,setIMonths]=useState(3);

  const [search,setSearch]=useState("");
  const [fCat,setFCat]=useState("전체");
  const [fMonth,setFMonth]=useState(getMonth());

  const [catEdit,setCatEdit]=useState(null);
  const [newCat,setNewCat]=useState({name:"",color:"#FF6B6B"});
  const [showAddCat,setShowAddCat]=useState(false);
  const [delCat,setDelCat]=useState(null);

  const [recForm,setRecForm]=useState({amount:"",method:"신용카드",category:"식비",memo:"",startDate:today(),endDate:"",hasEnd:false});
  const [showRecAdd,setShowRecAdd]=useState(false);
  const [editRecId,setEditRecId]=useState(null);

  const [autoMode,setAutoMode]=useState("image");
  const [pasteText,setPasteText]=useState("");
  const [imgData,setImgData]=useState(null);
  const [parsing,setParsing]=useState(false);
  const [parsed,setParsed]=useState([]);
  const [parseErr,setParseErr]=useState("");
  const fileRef=useRef();

  const [toast,setToast]=useState("");
  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(""),2500);};

  useEffect(()=>{LS.set("exp",expenses);},[expenses]);
  useEffect(()=>{LS.set("cats",cats);},[cats]);
  useEffect(()=>{LS.set("recs",recs);},[recs]);
  useEffect(()=>{if(apiKey)LS.set("apikey",apiKey);},[apiKey]);

  useEffect(()=>{
    if(!recs.length)return;
    const newOnes=genRec(recs,expenses);
    if(newOnes.length){setExpenses(es=>[...es,...newOnes]);showToast(`반복 지출 ${newOnes.length}건 자동 등록`);}
  },[]);

  const catMap=useMemo(()=>Object.fromEntries(cats.map(c=>[c.name,c.color])),[cats]);
  const catNames=useMemo(()=>cats.map(c=>c.name),[cats]);
  const resetForm=()=>setForm({date:today(),amount:"",method:"신용카드",category:cats[0]?.name||"",memo:""});

  const submitExp=()=>{
    const amt=+form.amount;
    if(!amt||amt<=0)return showToast("금액을 입력해주세요");
    if(editId){
      setExpenses(es=>es.map(e=>e.id===editId?{...form,id:editId,amount:amt}:e));
      setEditId(null);showToast("수정됐습니다");resetForm();setTab("list");return;
    }
    if(iMode==="installment"){
      const per=Math.floor(amt/iMonths),rem=amt-per*(iMonths-1),gid=Date.now();
      setExpenses(es=>[...es,...Array.from({length:iMonths},(_,i)=>({
        id:gid+i,date:addMo(form.date,i),amount:i===iMonths-1?rem:per,
        method:form.method,category:form.category,
        memo:`${form.memo?form.memo+" ":""}할부 ${i+1}/${iMonths}`,installmentGroup:gid
      }))]);
      showToast(`${iMonths}개월 할부 등록`);
    } else {
      setExpenses(es=>[...es,{...form,id:Date.now(),amount:amt}]);
      showToast("등록됐습니다");
    }
    resetForm();setTab("list");
  };

  const delExp=id=>{setExpenses(es=>es.filter(e=>e.id!==id));showToast("삭제됐습니다");};
  const delGroup=gid=>{setExpenses(es=>es.filter(e=>e.installmentGroup!==gid));showToast("할부 전체 삭제");};
  const startEdit=e=>{setForm({date:e.date,amount:String(e.amount),method:e.method,category:e.category,memo:e.memo});setEditId(e.id);setIMode("normal");setTab("input");};

  const submitRec=()=>{
    const amt=+recForm.amount;
    if(!amt||amt<=0)return showToast("금액을 입력해주세요");
    if(editRecId){
      setRecs(rs=>rs.map(r=>r.id===editRecId?{...r,...recForm,amount:amt,endDate:recForm.hasEnd?recForm.endDate:""}:r));
      setEditRecId(null);showToast("수정됐습니다");
    } else {
      const nr={id:Date.now(),...recForm,amount:amt,endDate:recForm.hasEnd?recForm.endDate:"",active:true};
      const newOnes=genRec([nr],expenses);
      if(newOnes.length)setExpenses(es=>[...es,...newOnes]);
      setRecs(rs=>[...rs,nr]);
      showToast(`반복 지출 등록 (${newOnes.length}건 생성)`);
    }
    setRecForm({amount:"",method:"신용카드",category:cats[0]?.name||"",memo:"",startDate:today(),endDate:"",hasEnd:false});
    setShowRecAdd(false);
  };
  const toggleRec=id=>setRecs(rs=>rs.map(r=>r.id===id?{...r,active:!r.active}:r));
  const delRec=id=>{setRecs(rs=>rs.filter(r=>r.id!==id));showToast("삭제됐습니다");};
  const startEditRec=r=>{setRecForm({amount:String(r.amount),method:r.method,category:r.category,memo:r.memo,startDate:r.startDate,endDate:r.endDate||"",hasEnd:!!r.endDate});setEditRecId(r.id);setShowRecAdd(true);};

  const addCat=()=>{
    if(!newCat.name.trim())return showToast("이름을 입력해주세요");
    if(cats.find(c=>c.name===newCat.name.trim()))return showToast("이미 존재합니다");
    setCats(cs=>[...cs,{name:newCat.name.trim(),color:newCat.color}]);
    setNewCat({name:"",color:"#FF6B6B"});setShowAddCat(false);showToast("추가됐습니다");
  };
  const saveEditCat=()=>{
    if(!catEdit.name.trim())return showToast("이름을 입력해주세요");
    const old=cats[catEdit.idx].name,nw=catEdit.name.trim();
    if(nw!==old&&cats.find(c=>c.name===nw))return showToast("이미 존재합니다");
    setCats(cs=>cs.map((c,i)=>i===catEdit.idx?{name:nw,color:catEdit.color}:c));
    if(nw!==old)setExpenses(es=>es.map(e=>e.category===old?{...e,category:nw}:e));
    setCatEdit(null);showToast("수정됐습니다");
  };
  const deleteCat=idx=>{
    const name=cats[idx].name,cnt=expenses.filter(e=>e.category===name).length;
    if(cnt>0){setDelCat({idx,name,cnt});return;}
    setCats(cs=>cs.filter((_,i)=>i!==idx));showToast("삭제됐습니다");
  };
  const confirmDelCat=()=>{
    const {idx,name}=delCat;
    setExpenses(es=>es.map(e=>e.category===name?{...e,category:"(삭제됨)"}:e));
    setCats(cs=>cs.filter((_,i)=>i!==idx));
    setDelCat(null);showToast("삭제됐습니다");
  };

  const handleFile=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{setImgData({base64:ev.target.result.split(",")[1],type:f.type,preview:ev.target.result});setParsed([]);setParseErr("");};
    r.readAsDataURL(f);
  };

  const buildPrompt=()=>`당신은 한국 가계부 지출 파싱 전문가입니다.
카테고리(${catNames.join(",")}), 지출방식(신용카드,체크카드,현금,계좌이체,기타) 중 선택.
지출만 추출, 수입/환불/취소 제외. 날짜 없으면 오늘(${today()}).
JSON 배열만 반환, 다른 텍스트 없이:
[{"date":"YYYY-MM-DD","amount":숫자,"method":"방식","category":"카테고리","memo":"내용"}]`;

  // ✅ Groq API 호출
  const parseAI=async()=>{
    if(!apiKey){setParseErr("설정에서 Groq API 키를 먼저 입력해주세요");return;}
    setParsing(true);setParsed([]);setParseErr("");
    try{
      const isImg=autoMode==="image"&&imgData;
      const model=isImg?"meta-llama/llama-4-scout-17b-16e-instruct":"llama-3.3-70b-versatile";
      const content=isImg
        ?[{type:"image_url",image_url:{url:`data:${imgData.type};base64,${imgData.base64}`}},{type:"text",text:buildPrompt()}]
        :buildPrompt()+"\n\n입력:\n"+pasteText;
      const res=await fetch("https://api.groq.com/openai/v1/chat/completions",{
        method:"POST",
        headers:{"Content-Type":"application/json","Authorization":`Bearer ${apiKey}`},
        body:JSON.stringify({model,messages:[{role:"user",content}],temperature:0.1,max_tokens:1000})
      });
      const data=await res.json();
      if(data.error){setParseErr("Groq 오류: "+data.error.message);setParsing(false);return;}
      const raw=data.choices?.[0]?.message?.content||"";
      const clean=raw.replace(/```json|```/g,"").trim();
      const items=JSON.parse(clean);
      if(!Array.isArray(items)||!items.length){setParseErr("인식된 항목이 없습니다.");setParsing(false);return;}
      setParsed(items.map((it,i)=>({...it,_id:i,selected:true})));
    }catch(e){setParseErr("파싱 오류: "+e.message);}
    setParsing(false);
  };

  const toggleSel=id=>setParsed(ps=>ps.map(p=>p._id===id?{...p,selected:!p.selected}:p));
  const updParsed=(id,f,v)=>setParsed(ps=>ps.map(p=>p._id===id?{...p,[f]:v}:p));
  const addParsed=()=>{
    const toAdd=parsed.filter(p=>p.selected).map(p=>({id:Date.now()+p._id,date:p.date,amount:+p.amount,method:p.method||"기타",category:p.category||cats[0]?.name,memo:p.memo||""}));
    if(!toAdd.length)return showToast("선택된 항목이 없습니다");
    setExpenses(es=>[...es,...toAdd]);
    setParsed([]);setImgData(null);setPasteText("");
    showToast(`${toAdd.length}건 등록됐습니다`);setTab("list");
  };

  const curM=getMonth(),prevM=getMonth(-1);
  const curTot=useMemo(()=>expenses.filter(e=>mk(e.date)===curM).reduce((a,e)=>a+e.amount,0),[expenses,curM]);
  const prevTot=useMemo(()=>expenses.filter(e=>mk(e.date)===prevM).reduce((a,e)=>a+e.amount,0),[expenses,prevM]);
  const diff=curTot-prevTot,diffPct=prevTot?Math.round(Math.abs(diff)/prevTot*100):null;
  const catData=useMemo(()=>{
    const m={};
    expenses.filter(e=>mk(e.date)===curM).forEach(e=>{m[e.category]=(m[e.category]||0)+e.amount;});
    return Object.entries(m).map(([name,value])=>({name,value})).sort((a,b)=>b.value-a.value);
  },[expenses,curM]);
  const filtered=useMemo(()=>expenses
    .filter(e=>mk(e.date)===fMonth)
    .filter(e=>fCat==="전체"||e.category===fCat)
    .filter(e=>!search||e.memo?.includes(search)||e.category.includes(search))
    .sort((a,b)=>b.date.localeCompare(a.date))
  ,[expenses,fMonth,fCat,search]);
  const months=useMemo(()=>{const s=new Set(expenses.map(e=>mk(e.date)));s.add(getMonth());s.add(getMonth(-1));return [...s].sort().reverse();},[expenses]);

  return(
    <div style={{maxWidth:430,margin:"0 auto",minHeight:"100vh",background:"#0f0f1e",color:"#e0e0f0",position:"relative",paddingBottom:75}}>

      {toast&&<div style={{position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",background:"#4ECDC4",color:"#000",padding:"8px 20px",borderRadius:20,zIndex:999,fontSize:14,fontWeight:600,whiteSpace:"nowrap"}}>{toast}</div>}

      {delCat&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:998,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
        <div style={{background:"#1a1a2e",borderRadius:20,padding:24,maxWidth:320,width:"100%"}}>
          <div style={{fontSize:16,fontWeight:700,marginBottom:10}}>카테고리 삭제</div>
          <div style={{fontSize:14,color:"#ccc",lineHeight:1.6,marginBottom:20}}><b style={{color:"#FF6B6B"}}>'{delCat.name}'</b>에 <b>{delCat.cnt}건</b>의 지출이 있습니다.</div>
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>setDelCat(null)} style={{flex:1,padding:12,borderRadius:12,border:"none",background:"#2a2a3a",color:"#aaa",cursor:"pointer",fontSize:14}}>취소</button>
            <button onClick={confirmDelCat} style={{flex:1,padding:12,borderRadius:12,border:"none",background:"#FF6B6B",color:"#fff",fontWeight:700,cursor:"pointer",fontSize:14}}>삭제</button>
          </div>
        </div>
      </div>}

      <div style={{padding:"20px 20px 0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{fontSize:20,fontWeight:700}}>💸 가계부</span>
        <span style={{fontSize:13,color:"#8888aa"}}>{new Date().toLocaleDateString("ko-KR",{year:"numeric",month:"long"})}</span>
      </div>

      {tab==="home"&&<div style={{padding:20}}>
        <div style={{background:"linear-gradient(135deg,#667eea,#764ba2)",borderRadius:20,padding:"24px 20px",marginBottom:16}}>
          <div style={{fontSize:13,opacity:0.8,marginBottom:6}}>이번 달 지출</div>
          <div style={{fontSize:32,fontWeight:800,marginBottom:8}}>₩{fmt(curTot)}</div>
          <div style={{fontSize:13,opacity:0.85}}>

              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{METHODS.map(m=><button key={m} onClick={()=>setRecForm(f=>({...f,method:m}))} style={chip(recForm.method===m)}>{m}</button>)}</div>
            </div>
            <div style={{marginBottom:12}}><label style={LB}>시작일</label><input type="date" value={recForm.startDate} onChange={e=>setRecForm(f=>({...f,startDate:e.target.value}))} style={IB}/></div>
            <div style={{marginBottom:14}}>
              <label style={{display:"flex",alignItems:"center",gap:8,fontSize:13,color:"#8888aa",marginBottom:8,cursor:"pointer"}}>
                <input type="checkbox" checked={recForm.hasEnd} onChange={e=>setRecForm(f=>({...f,hasEnd:e.target.checked}))} style={{accentColor:"#667eea",width:16,height:16}}/>종료일 설정
              </label>
              {recForm.hasEnd&&<input type="date" value={recForm.endDate} onChange={e=>setRecForm(f=>({...f,endDate:e.target.value}))} style={IB}/>}
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>{setShowRecAdd(false);setEditRecId(null);}} style={{flex:1,padding:10,borderRadius:10,border:"none",background:"#2a2a3a",color:"#aaa",cursor:"pointer"}}>취소</button>
              <button onClick={submitRec} style={{flex:1,padding:10,borderRadius:10,border:"none",background:"#667eea",color:"#fff",fontWeight:700,cursor:"pointer"}}>{editRecId?"저장":"추가"}</button>
            </div>
          </div>}
          {recs.length===0&&!showRecAdd&&<div style={{textAlign:"center",color:"#555",padding:40,fontSize:15}}>등록된 반복 지출이 없습니다</div>}
          {recs.map(r=><div key={r.id} style={{background:"#1a1a2e",borderRadius:14,padding:"14px 16px",marginBottom:10}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
              <div style={{width:10,height:10,borderRadius:"50%",background:catMap[r.category]||"#aaa",flexShrink:0}}/>
              <div style={{flex:1}}>
                <div style={{fontSize:15,fontWeight:600}}>{r.memo||r.category}</div>
                <div style={{fontSize:13,color:"#8888aa"}}>{r.category} · {r.method}</div>
              </div>
              <div style={{fontSize:16,fontWeight:700,color:"#FF6B6B"}}>₩{fmt(r.amount)}<span style={{fontSize:12,color:"#8888aa",fontWeight:400}}>/월</span></div>
            </div>
            <div style={{fontSize:12,color:"#555",marginBottom:10}}>{r.startDate} ~ {r.endDate||"종료일 없음"}</div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>toggleRec(r.id)} style={{flex:1,padding:"7px 0",borderRadius:10,border:"none",cursor:"pointer",fontSize:13,fontWeight:600,background:r.active?"#1a3a1a":"#2a2a2a",color:r.active?"#88D8B0":"#555"}}>{r.active?"● 활성":"○ 정지"}</button>
              <button onClick={()=>startEditRec(r)} style={{flex:1,padding:"7px 0",borderRadius:10,border:"none",background:"#2a2a3a",color:"#aaa",fontSize:13,cursor:"pointer"}}>수정</button>
              <button onClick={()=>delRec(r.id)} style={{flex:1,padding:"7px 0",borderRadius:10,border:"none",background:"#3a1a1a",color:"#ff6b6b",fontSize:13,cursor:"pointer"}}>삭제</button>
            </div>
          </div>)}
          {!showRecAdd&&<button onClick={()=>{setShowRecAdd(true);setEditRecId(null);setRecForm({amount:"",method:"신용카드",category:cats[0]?.name||"",memo:"",startDate:today(),endDate:"",hasEnd:false});}}
            style={{width:"100%",padding:14,borderRadius:14,border:"2px dashed #2a2a3a",background:"none",color:"#667eea",fontSize:14,fontWeight:600,cursor:"pointer",marginTop:4}}>+ 반복 지출 추가</button>}
        </>}
      </div>}

      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:"#1a1a2e",borderTop:"1px solid #2a2a3a",display:"flex",zIndex:100}}>
        {[["home","🏠","홈"],["list","📋","내역"],["input","➕","입력"],["auto","✨","자동"],["settings","⚙️","설정"]].map(([t,icon,label])=>(
          <button key={t} onClick={()=>{setTab(t);if(t!=="input"&&editId){setEditId(null);resetForm();}}}
            style={{flex:1,padding:"10px 0",border:"none",background:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,color:tab===t?"#667eea":"#555"}}>
            <span style={{fontSize:17}}>{icon}</span>
            <span style={{fontSize:10,fontWeight:tab===t?700:400}}>{label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
